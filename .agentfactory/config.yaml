apiVersion: v1
kind: RepositoryConfig
repository: github.com/RenseiAI/tui-components
profiles:
  codex-dev:
    provider: codex
    model: gpt-5.4
    effort: high
    openai:
      serviceTier: fast
      reasoningSummary: concise
    subAgent:
      model: gpt-5.4-mini
      effort: low

  claude-coord:
    provider: claude
    model: claude-opus-4-7
    effort: xhigh
    anthropic:
      contextWindow: 1000000
    subAgent:
      provider: claude
      model: claude-sonnet-4-6
      effort: medium

  claude-qa:
    provider: claude
    model: claude-sonnet-4-6
    effort: medium

dispatch:
  default: codex-dev
  byWorkType:
    coordination: claude-coord
    qa: claude-qa
packageManager: none
buildCommand: "go build ./..."
testCommand: "go test ./..."
validateCommand: "go vet ./..."
allowedProjects:
  - tui-components
codeIntelligence:
  enforceUsage: true
mergeDriver: mergiraf
mergeQueue:
  enabled: true
  provider: local
  strategy: rebase
  mergiraf: true
  lockFileRegenerate: false
  autoEnqueue: true
  testCommand: "go test ./..."
  testTimeout: 300000
  pollInterval: 10000
  maxRetries: 2
  escalation:
    onConflict: reassign
    onTestFailure: notify
quality:
  baselineEnabled: true
  ratchetEnabled: true
  boyscoutRule: true
  tddWorkflow: true
