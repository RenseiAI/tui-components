apiVersion: v1
kind: RepositoryConfig
repository: github.com/RenseiAI/tui-components
providers:
  default: claude
  byWorkType:
    research: claude
    qa: claude
    acceptance: claude
packageManager: none
buildCommand: "go build ./..."
testCommand: "go test ./..."
validateCommand: "go vet ./..."
allowedProjects:
  - tui-components
quality:
  baselineEnabled: true
  ratchetEnabled: true
  boyscoutRule: true
  tddWorkflow: true
